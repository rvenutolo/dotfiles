# Overrides layered on top of Determinate Nix's managed /etc/nix/nix.conf.
# Symlinked into Determinate's include path (confirm the exact path with
# `cat /etc/nix/nix.conf` after install). These settings are daemon-
# authoritative and are silently ignored if placed in the per-user
# ~/.config/nix/nix.conf under multi-user.
keep-outputs = true
keep-derivations = true
download-buffer-size = 524288000
# Only needed if `nix config show auto-optimise-store` is not already true
# under Determinate's defaults:
auto-optimise-store = true
extra-substituters = https://nix-community.cachix.org
extra-trusted-public-keys = nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs=
