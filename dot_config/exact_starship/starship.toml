# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# в–‘в–’в–“ оӮҙоӮ¶ оӮ°
format = """\
[оӮ°](fg:#2E3440 bg:#8FBCBB)\
[оӮ°](fg:#8FBCBB bg:#3B4252)\
$username\
$hostname\
[оӮ°](fg:#3B4252 bg:#434C5E)\
$directory\
[оӮ°](fg:#434C5E bg:#4C566A)\
$git_branch\
$git_commit\
$git_state\
$git_status\
$git_metrics\
[оӮ°](fg:#4C566A bg:#5E81AC)\
$package\
$docker_context\
[оӮ°](fg:#5E81AC bg:#81A1C1)\
$c\
$golang\
$haskell\
$java\
$kotlin\
$lua\
$nodejs\
$perl\
$python\
$ruby\
$rust\
$scala\
[оӮ°](fg:#81A1C1 bg:#8FBCBB)\
[оӮ°](fg:#8FBCBB bg:#2E3440)\
$fill\
$status\
$cmd_duration\
$jobs\
$shlvl\
$time\
$line_break\
$character\
"""
scan_timeout = 30
command_timeout = 500
add_newline = false
continuation_prompt = 'в–¶в–¶'

[c]
format = '[${symbol} ($version(-$name))]($style)'
style = 'bg:#81A1C1 bold'
# C оҳһ
symbol = 'оҳһ'

[character]
format = '$symbol '
# в–¶ вқұ вһ” вһІ в®Ҡ в®һ в®© гҖӢ рҹ ¶ рҹЎҶ
success_symbol = '[в–¶](fg:#A3BE8C)'
error_symbol = '[в–¶](fg:#BF616A)'

[cmd_duration]
format = '[$duration]($style) '
style = 'fg:#d8dee9 bold'
min_time = 0

[directory]
format = '[$path]($style)[ $read_only]($read_only_style)'
# оңӮ пҮ“ пҮ’ пһЎ
repo_root_format = '[$repo_root]($repo_root_style)[$path]($style)[ $read_only]($read_only_style)'
style = 'bg:#434C5E bold'
repo_root_style = 'bg:#434C5E bold'
read_only_style = 'fg:#EBCB8B bg:#434C5E bold'
# п Ҫ о©ө оҜ§ пҖЈ
read_only = 'п Ҫ'
truncation_length = 0

[docker_context]
format = '[$symbol$context]($style) '
style = 'bg:#81A1C1 bold'
symbol = 'рҹҗі'

[fill]
symbol = ' '

[git_branch]
format = '[$symbol $branch(:$remote_branch)]($style)'
style = 'bg:#4C566A bold'
# оӮ  пҗҳ оңҘ п¬«
symbol = 'оңҘ'

[git_commit]
# о«ј оң© пҗ—
format = '[пҗ— $hash$tag]($style)'
style = 'fg:#EBCB8B bg:#4C566A bold'
# рҹҸ· пҖ« п§ё пҗ’
tag_symbol = ' пҖ« '
tag_disabled = false

[git_state]
format = '[ $state ($progress_current/$progress_total)]($style)'
style = 'fg:#EBCB8B bg:#4C566A bold'

[git_metrics]
format = '([+$added]($added_style))([-$deleted]($deleted_style))'
added_style = 'fg:#A3BE8C bg:#4C566A bold'
deleted_style = 'fg:#BF616A bg:#4C566A bold'
disabled = false

[git_status]
format = '([ \[$all_status$ahead_behind\]]($style))'
style = 'fg:#D08770 bg:#4C566A bold'

[golang]
format = '[${symbol} (${version})]($style)'
style = 'bg:#81A1C1 bold'
symbol = 'оҳ§'

[haskell]
format = '[${symbol} (${version})]($style)'
style = 'bg:#81A1C1 bold'
# О» оқ·
symbol = 'оқ·'

[hostname]
format = '[@$hostname]($style)'
style = 'bg:#3B4252 bold'

[java]
format = '[${symbol} (${version})]($style)'
style = 'bg:#81A1C1 bold'
# вҳ• оңё оү–
symbol = 'оү–'

[jobs]
format = '[$symbol]($style) '
style = 'fg:#81A1C1 bold'
# пҖ“ вңҰ ВӨ б … вҒҳ в—Ҳ в—Ҷ вҷҰ вҹЎ в¬ў в¬Ј в¬ҹ в¬Ө вҜҒ вҜғ вҜҢ вҜҚ вҜҺ вҜҸ вӣ¬
symbol = 'вңҰ'
symbol_threshold = 1

[kotlin]
format = '[${symbol} (${version})]($style)'
style = 'bg:#81A1C1 bold'
# в“Җ в“ҡ рқҗҠ рҹ„ҡ рҹ„ә рҹ…ҡ рҹ…ә рҹҮ°
symbol = 'рқҗҠ'

[lua]
format = '[${symbol} (${version})]($style)'
style = 'bg:#81A1C1 bold'
#рҹҢҷ оҳ 
symbol = 'оҳ '

[nodejs]
format = '[${symbol} (${version})]($style)'
style = 'bg:#81A1C1 bold'
# оңҳ
symbol = 'оңҳ'

[package]
format = '[$symbol $version]($style)'
style = 'bg:#5E81AC bold'
# рҹ“Ұ пЈ– о¬© пЈ• п’Ү
symbol = 'п’Ү'

[perl]
format = '[${symbol} (${version})]($style)'
style = 'bg:#81A1C1 bold'
# рҹҗӘ
symbol = 'pl'

[python]
format = '[${symbol}${pyenv_prefix} (${version})]($style)'
style = 'bg:#81A1C1 bold'
# рҹҗҚ оҲө
symbol = 'оҲө'

[ruby]
format = '[${symbol} (${version})]($style)'
style = 'bg:#81A1C1 bold'
# рҹ’Һ оһ‘
symbol = 'оһ‘'

[rust]
format = '[${symbol} (${version})]($style)'
style = 'bg:#81A1C1 bold'
# рҹҰҖ оһЁ
symbol = 'оһЁ'

[scala]
format = '[${symbol} (${version})]($style)'
style = 'bg:#81A1C1 bold'
# рҹҶӮ оң·
symbol = 'оң·'

[shlvl]
threshold = 2
format = '[$symbol$shlvl]($style) '
symbol = 'вҶ•'
style = 'fg:#EBCB8B bold'
disabled = false

[status]
format = '[$symbol]($style) '
style = 'fg:#BF616A bold'
# пҖҢ пҒҳ пҒқ п…Ҡ пҒҶ пҳ« п«ҹ п«  пҳұ пҳІ пҗ® в¬Ө рҹҹў вң“ вң”
success_symbol = '[пҖҢ](fg:#A3BE8C bold)'
# в•і вқҢ вҳ  вҡЎ вҡ‘ вҡ  вҡӘ вҡ« вӣқ вӣһ вң• вң– вң— вңҳ вқҺ вқ“ вқ” вқ• вқ— вЁҜ в®Ҫ в®ҫ в®ҝ вҜ„ рҹҸұ рҹҸІ рҹҸі рҹҸҙ рҹ—ҷ рҹ—І рҹ—ҙ рҹ—¶ рҹ—· п‘®
symbol = 'вң–'
# вҠҳ вҚү вҠҳ вҚү вӣ” вӯҷ в®Ҫ в®ҫ в®ҝ
not_executable_symbol = 'вӣ”'
# о©ӯ оӯҺ пҖӮ пҖҗ пҗў рҹ”Қ
not_found_symbol = 'пҖҗ'
# оҖҠ оҖү
sigint_symbol = 'оҖү'
# оҖҠ вҡЎ
signal_symbol = 'оҖҠ'
map_symbol = true
disabled = false

[time]
format = '[$time]($style)'
style = 'fg:#d8dee9 bold'
time_format = '%I:%M%P'
disabled = false

[username]
format = '[$user]($style)'
style_user = 'bg:#3B4252 bold'
style_root = 'bg:#3B4252 fg:D08770 bold'
