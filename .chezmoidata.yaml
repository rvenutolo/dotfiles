# `dot_config/profile.sh.tmpl` exports them as env vars for shell consumers.
# Paths are home-relative (no leading slash); join with `.chezmoi.homeDir` in
# templates, e.g. `{{ .chezmoi.homeDir }}/{{ .paths.keys_dir }}`.

